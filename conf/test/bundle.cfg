-- vim:set ft=lua:

local L4 = require("L4")
local l = L4.default_loader
local t = require("rom/test_env")

be = t.BUNDLE_ENV;

child_env = {
  icu = L4.Env.icu,
  iommu = L4.Env.iommu,
  jdb = L4.Env.jdb,
  rom = L4.Env.rom,
  rwfs = L4.Env.rwfs,
  sigma0 = L4.Env.sigma0,
  kip = L4.Env.kip,
  log = L4.Env.log,
  mem = L4.Env.mem,
}

print("BUNDLE TEST START")
print("BUNDLE TEST EXPECT TEST COUNT " .. #t.TEST_TARGET)
for i, test_target in ipairs(t.TEST_TARGET) do
  if (be.TEST_TARGET ~= nil and be.TEST_TARGET[test_target] ~= nil) then
    -- Extra tests usually use a binary with a different name
    test_bin = be.TEST_TARGET[test_target]
  else
    test_bin = test_target
  end
  if (be.SKIP ~= nil and be.SKIP[test_target] ~= nil) then
    print("TAP TEST START")
    print("1..0 # SKIP " .. be.SKIP[test_target])
    print("TAP TEST FINISH")
  else
    if (be.TEST_TAP_PLUGINS ~= nil) and
       (be.TEST_TAP_PLUGINS[test_target] ~= nil) then
      print("BUNDLE CONTROL " .. be.TEST_TAP_PLUGINS[test_target])
    end
    print("Running " .. i .. "/" .. #t.TEST_TARGET .. " " .. test_target)
    local ned_cfg = t.BASE_NED_CFG
    if (be.NED_CFG ~= nil) and (be.NED_CFG[test_target] ~= nil) then
      ned_cfg = be.NED_CFG[test_target]
    end
    if ned_cfg ~= nil then
      -- No need to handle test_args here, child-ned will get them from test_env.lua
      l:startv(
        {
          caps = child_env,
          log = L4.Env.log
        }, "rom/ned", "--wait-and-exit", "rom/" .. ned_cfg, test_bin):wait()
    else
      -- Get test args for current test_target
      local test_args = ""
      if be.TEST_ARGS[test_target] ~= nil then
        test_args = " " .. be.TEST_ARGS[test_target]
      end
      print("Starting 'rom/" .. test_bin .. test_args .. "'")
      l:start(
        {
          caps = child_env,
          log = L4.Env.log
        }, "rom/" .. test_bin .. test_args):wait()
    end
    if (be.TEST_TAP_PLUGINS ~= nil) and
       (be.TEST_TAP_PLUGINS[test_target] ~= nil) then
      print("BUNDLE CONTROL TAPOutput")
    end
  end
end
print("BUNDLE TEST FINISH")

